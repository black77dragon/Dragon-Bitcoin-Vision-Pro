name: BitcoinRegimeNavigator

options:
  createIntermediateGroups: true
  generateEmptyDirectories: true
  deploymentTarget:
    visionOS: "1.0"

packages:
  BitcoinRegimeNavigatorPackage:
    path: apps/visionos

targets:
  BitcoinRegimeNavigatorApp:
    type: application
    platform: visionOS
    sources:
      - path: apps/visionos-app/Sources
      - path: apps/visionos-app/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.black77dragon.BitcoinRegimeNavigator
        PRODUCT_NAME: Bitcoin Regime Navigator
        SWIFT_VERSION: 6.0
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_AppReleaseDate: "2026-03-10"
        INFOPLIST_KEY_CFBundleDisplayName: Bitcoin Regime Navigator
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: BitcoinRegimeWidgetExtension
        embed: true
      - package: BitcoinRegimeNavigatorPackage
        product: BitcoinRegimeDomain
      - package: BitcoinRegimeNavigatorPackage
        product: BitcoinRegimeUI
  BitcoinRegimeWidgetExtension:
    type: app-extension
    platform: visionOS
    sources:
      - path: apps/visionos-widget/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.black77dragon.BitcoinRegimeNavigator.WidgetExtension
        PRODUCT_NAME: Bitcoin Regime Widget
        SWIFT_VERSION: 6.0
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        INFOPLIST_FILE: apps/visionos-widget/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
        XROS_DEPLOYMENT_TARGET: "26.0"
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: BitcoinRegimeNavigatorPackage
        product: BitcoinRegimeDomain

schemes:
  BitcoinRegimeNavigatorApp:
    build:
      targets:
        BitcoinRegimeNavigatorApp: all
    run:
      config: Debug
      environmentVariables:
        BITCOIN_REGIME_API_BASE_URL: http://127.0.0.1:8787
